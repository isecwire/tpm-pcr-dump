name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev build-essential

      - name: Build
        run: make

      - name: Test
        run: make test
